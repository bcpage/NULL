<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>00173 — Lissajous</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050508; color: #8a9aaa;
    font-family: 'Courier New', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    padding: 30px 20px 50px;
  }
  .room-id { font-size: 10px; letter-spacing: 5px; color: #223; }
  .title { font-size: 11px; letter-spacing: 5px; color: #445; text-transform: uppercase; }

  #lj-canvas { display: block; border: 1px solid #0f0f1e; }

  .controls { display: flex; gap: 12px; flex-wrap: wrap; justify-content: center; }
  .ctrl-group { display: flex; flex-direction: column; align-items: center; gap: 4px; }
  .ctrl-label { font-size: 8px; letter-spacing: 2px; color: #223; }
  .ctrl-val { font-size: 9px; letter-spacing: 1px; color: #334; }
  input[type=range] {
    -webkit-appearance: none; width: 90px; height: 3px;
    background: #0f0f18; outline: none;
  }
  input[type=range]::-webkit-slider-thumb {
    -webkit-appearance: none; width: 10px; height: 10px;
    border-radius: 50%; background: #3a5a7a; cursor: pointer;
  }

  .presets { display: flex; gap: 6px; flex-wrap: wrap; justify-content: center; }
  button {
    background: #060610; border: 1px solid #0f0f18; color: #334;
    font-family: 'Courier New', monospace; font-size: 9px;
    letter-spacing: 2px; padding: 6px 12px; cursor: pointer;
  }
  button:hover { background: #0a0a18; color: #556; }
  button.active { border-color: #2a4a2a; color: #7acc7a; }

  .eq-display { font-size: 9px; letter-spacing: 1px; color: #1a3a4a; text-align: center; min-height: 16px; }

  .note { font-size: 10px; letter-spacing: 1px; color: #223; text-align: center; line-height: 2.2; max-width: 380px; border-top: 1px solid #111120; padding-top: 12px; }
</style>
</head>
<body data-game="00173" data-nav="matrix">
<div class="room-id">ROOM 00173</div>
<div class="title">Lissajous</div>

<canvas id="lj-canvas" width="440" height="440"></canvas>

<div class="controls">
  <div class="ctrl-group">
    <div class="ctrl-label">FREQ A (x)</div>
    <input type="range" id="fa-sl" min="1" max="10" value="3" step="1">
    <div class="ctrl-val" id="fa-val">3</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">FREQ B (y)</div>
    <input type="range" id="fb-sl" min="1" max="10" value="2" step="1">
    <div class="ctrl-val" id="fb-val">2</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">PHASE δ</div>
    <input type="range" id="phase-sl" min="0" max="628" value="157" step="1">
    <div class="ctrl-val" id="phase-val">π/2</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">SPEED</div>
    <input type="range" id="speed-sl" min="0" max="4" value="1" step="0.05">
    <div class="ctrl-val" id="speed-val">1.00</div>
  </div>
  <div class="ctrl-group">
    <div class="ctrl-label">TRAIL</div>
    <input type="range" id="trail-sl" min="0" max="0.99" value="0.92" step="0.01">
    <div class="ctrl-val" id="trail-val">0.92</div>
  </div>
</div>

<div class="presets">
  <button onclick="setPreset(1,1,157)">1:1</button>
  <button onclick="setPreset(1,2,0)">1:2</button>
  <button onclick="setPreset(1,3,0)">1:3</button>
  <button onclick="setPreset(2,3,157)" class="active">2:3</button>
  <button onclick="setPreset(3,4,157)">3:4</button>
  <button onclick="setPreset(3,5,0)">3:5</button>
  <button onclick="setPreset(5,6,157)">5:6</button>
  <button id="pause-btn">PAUSE</button>
  <button id="color-btn">CYCLE COLOR</button>
</div>

<div class="eq-display" id="eq-display"></div>

<div class="note">
  x(t) = sin(at + δ)<br>
  y(t) = sin(bt)<br>
  When a/b is rational, the curve closes.<br>
  When irrational, it fills the plane.
</div>

<script src="/shared/matrix-nav.js"></script>
<script>
const canvas = document.getElementById('lj-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;
const R = W / 2 - 20; // radius

let fa = 3, fb = 2;
let phase = Math.PI / 2;
let speed = 1;
let trail = 0.92;
let t = 0;
let paused = false;
let colorMode = 0;

const COLORS = [
  { r: 60, g: 120, b: 200 },   // blue
  { r: 80, g: 200, b: 120 },   // green
  { r: 200, g: 80, b: 120 },   // red
  { r: 180, g: 120, b: 60 },   // amber
  { r: 120, g: 60, b: 200 },   // violet
];

function getColor(t) {
  const c = COLORS[colorMode % COLORS.length];
  const alpha = 0.7 + 0.3 * Math.sin(t * 0.3);
  return `rgba(${c.r},${c.g},${c.b},${alpha.toFixed(2)})`;
}

function tick() {
  if (!paused) {
    // Trail
    ctx.fillStyle = `rgba(5,5,8,${1 - trail})`;
    ctx.fillRect(0, 0, W, H);

    const steps = Math.ceil(speed * 3) + 1;
    const dt = 0.005 * speed;

    for (let s = 0; s < steps; s++) {
      const x0 = W/2 + R * Math.sin(fa * t + phase);
      const y0 = H/2 + R * Math.sin(fb * t);
      t += dt / steps;
      const x1 = W/2 + R * Math.sin(fa * t + phase);
      const y1 = H/2 + R * Math.sin(fb * t);

      ctx.beginPath();
      ctx.moveTo(x0, y0);
      ctx.lineTo(x1, y1);
      ctx.strokeStyle = getColor(t);
      ctx.lineWidth = 1.5;
      ctx.stroke();
    }
  }
  requestAnimationFrame(tick);
}

function updateEq() {
  const phaseStr = phase === 0 ? '0' : phase === Math.PI/2 ? 'π/2' : phase === Math.PI ? 'π' : (phase / Math.PI).toFixed(2) + 'π';
  document.getElementById('eq-display').textContent = `x(t) = sin(${fa}t + ${phaseStr}) · y(t) = sin(${fb}t)`;
}

document.getElementById('fa-sl').addEventListener('input', e => {
  fa = parseInt(e.target.value);
  document.getElementById('fa-val').textContent = fa;
  updateEq();
  ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, W, H);
});
document.getElementById('fb-sl').addEventListener('input', e => {
  fb = parseInt(e.target.value);
  document.getElementById('fb-val').textContent = fb;
  updateEq();
  ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, W, H);
});
document.getElementById('phase-sl').addEventListener('input', e => {
  phase = parseInt(e.target.value) / 100;
  const phaseStr = (phase / Math.PI).toFixed(2) + 'π';
  document.getElementById('phase-val').textContent = phaseStr;
  updateEq();
  ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, W, H);
});
document.getElementById('speed-sl').addEventListener('input', e => {
  speed = parseFloat(e.target.value);
  document.getElementById('speed-val').textContent = speed.toFixed(2);
});
document.getElementById('trail-sl').addEventListener('input', e => {
  trail = parseFloat(e.target.value);
  document.getElementById('trail-val').textContent = trail.toFixed(2);
});

document.getElementById('pause-btn').addEventListener('click', () => {
  paused = !paused;
  document.getElementById('pause-btn').textContent = paused ? 'RESUME' : 'PAUSE';
  document.getElementById('pause-btn').classList.toggle('active', paused);
});
document.getElementById('color-btn').addEventListener('click', () => {
  colorMode = (colorMode + 1) % COLORS.length;
  ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, W, H);
});

function setPreset(a, b, ph100) {
  fa = a; fb = b; phase = ph100 / 100;
  document.getElementById('fa-sl').value = a;
  document.getElementById('fb-sl').value = b;
  document.getElementById('phase-sl').value = ph100;
  document.getElementById('fa-val').textContent = a;
  document.getElementById('fb-val').textContent = b;
  const phaseStr = phase === 0 ? '0' : phase === Math.PI/2 ? 'π/2' : (phase / Math.PI).toFixed(2) + 'π';
  document.getElementById('phase-val').textContent = phaseStr;
  updateEq();
  t = 0;
  ctx.fillStyle = '#050508'; ctx.fillRect(0, 0, W, H);
}
window.setPreset = setPreset;

ctx.fillStyle = '#050508';
ctx.fillRect(0, 0, W, H);
updateEq();
tick();
</script>
</body>
</html>
