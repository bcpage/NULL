<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Dots and Boxes</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }
    h1 { font-size: clamp(20px, 4vw, 28px); margin-top: 4px; }
    #board-wrap { flex: 1; display: flex; align-items: center; justify-content: center; }
    canvas { display: block; cursor: pointer; touch-action: none; }
    #info { display: flex; gap: 24px; font-size: clamp(14px, 3vw, 20px); }
    .player-score { padding: 6px 16px; border-radius: 8px; }
    .p1 { background: #e9456022; border: 2px solid #e94560; }
    .p2 { background: #4488ff22; border: 2px solid #4488ff; }
    .active { opacity: 1; } .inactive { opacity: 0.4; }
    #status-msg { font-size: clamp(13px, 2.5vw, 18px); color: #aaa; text-align: center; }
  </style>
</head>
<body data-game="00036">
  <h1>Dots and Boxes</h1>
  <div id="info">
    <div class="player-score p1" id="s1">Player 1: 0</div>
    <div class="player-score p2" id="s2">Player 2: 0</div>
  </div>
  <div id="board-wrap"><canvas id="c"></canvas></div>
  <div id="status-msg">shared board — all visitors play together</div>

  <script src="/shared/nav.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const COLS = 5, ROWS = 5;
    const COLORS = ['#e94560', '#4488ff'];

    let state = null;
    let ws;
    let cellSize = 60, pad = 30;

    function resize() {
      const avail = Math.min(window.innerWidth - 16, window.innerHeight - 180);
      cellSize = Math.floor((avail - 60) / COLS);
      pad = 30;
      canvas.width = COLS * cellSize + pad * 2;
      canvas.height = ROWS * cellSize + pad * 2;
      if (state) draw();
    }

    function dotPos(c, r) {
      return { x: pad + c * cellSize, y: pad + r * cellSize };
    }

    function draw() {
      if (!state) return;
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // Boxes
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const owner = state.boxes[r * COLS + c];
          if (owner) {
            ctx.fillStyle = owner === 1 ? '#e9456022' : '#4488ff22';
            const { x, y } = dotPos(c, r);
            ctx.fillRect(x + 2, y + 2, cellSize - 4, cellSize - 4);
            ctx.fillStyle = owner === 1 ? '#e9456088' : '#4488ff88';
            ctx.font = `${Math.floor(cellSize * 0.4)}px Fredoka One`;
            ctx.textAlign = 'center';
            ctx.textBaseline = 'middle';
            ctx.fillText(owner, x + cellSize / 2, y + cellSize / 2);
          }
        }
      }

      // Horizontal lines
      for (let r = 0; r <= ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const idx = r * COLS + c;
          const drawn = state.hLines[idx];
          const { x, y } = dotPos(c, r);
          ctx.strokeStyle = drawn ? (drawn === 1 ? '#e94560' : '#4488ff') : '#2a2a44';
          ctx.lineWidth = drawn ? 4 : 2;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x + cellSize, y);
          ctx.stroke();
        }
      }

      // Vertical lines
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c <= COLS; c++) {
          const idx = r * (COLS + 1) + c;
          const drawn = state.vLines[idx];
          const { x, y } = dotPos(c, r);
          ctx.strokeStyle = drawn ? (drawn === 1 ? '#e94560' : '#4488ff') : '#2a2a44';
          ctx.lineWidth = drawn ? 4 : 2;
          ctx.beginPath();
          ctx.moveTo(x, y);
          ctx.lineTo(x, y + cellSize);
          ctx.stroke();
        }
      }

      // Dots
      for (let r = 0; r <= ROWS; r++) {
        for (let c = 0; c <= COLS; c++) {
          const { x, y } = dotPos(c, r);
          ctx.fillStyle = '#aaa';
          ctx.beginPath();
          ctx.arc(x, y, 5, 0, Math.PI * 2);
          ctx.fill();
        }
      }

      // Scores
      document.getElementById('s1').textContent = `P1: ${state.scores[0]}`;
      document.getElementById('s2').textContent = `P2: ${state.scores[1]}`;
      const s1 = document.getElementById('s1'), s2 = document.getElementById('s2');
      s1.className = 'player-score p1 ' + (state.turn === 1 && state.status === 'playing' ? 'active' : 'inactive');
      s2.className = 'player-score p2 ' + (state.turn === 2 && state.status === 'playing' ? 'active' : 'inactive');

      const msgEl = document.getElementById('status-msg');
      if (state.status === 'done') {
        if (state.winner === 0) msgEl.textContent = "It's a draw! New game starting…";
        else msgEl.textContent = `Player ${state.winner} wins! New game starting…`;
      } else {
        msgEl.textContent = `Player ${state.turn}'s turn`;
      }
    }

    function hitTest(mx, my) {
      const threshold = cellSize * 0.22;
      // Check horizontal lines
      for (let r = 0; r <= ROWS; r++) {
        for (let c = 0; c < COLS; c++) {
          const { x, y } = dotPos(c, r);
          const cx2 = x + cellSize / 2, cy2 = y;
          if (Math.abs(mx - cx2) < cellSize / 2 - 4 && Math.abs(my - cy2) < threshold) {
            return { axis: 'h', idx: r * COLS + c };
          }
        }
      }
      // Check vertical lines
      for (let r = 0; r < ROWS; r++) {
        for (let c = 0; c <= COLS; c++) {
          const { x, y } = dotPos(c, r);
          const cx2 = x, cy2 = y + cellSize / 2;
          if (Math.abs(mx - cx2) < threshold && Math.abs(my - cy2) < cellSize / 2 - 4) {
            return { axis: 'v', idx: r * (COLS + 1) + c };
          }
        }
      }
      return null;
    }

    canvas.addEventListener('click', e => {
      if (!ws || ws.readyState !== WebSocket.OPEN || !state || state.status !== 'playing') return;
      const rect = canvas.getBoundingClientRect();
      const mx = e.clientX - rect.left, my = e.clientY - rect.top;
      const hit = hitTest(mx, my);
      if (hit) ws.send(JSON.stringify({ game: 'dots', type: 'line', ...hit }));
    });

    function connect() {
      ws = new WebSocket(`ws://${window.location.host}`);
      ws.onmessage = e => {
        const d = JSON.parse(e.data);
        if (d.game !== 'dots') return;
        if (d.type === 'state') { state = d; draw(); }
      };
      ws.onclose = () => setTimeout(connect, 3000);
    }

    resize();
    window.addEventListener('resize', resize);
    connect();
  </script>
</body>
</html>
