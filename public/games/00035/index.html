<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Trolley Problem</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 8px;
      gap: 16px;
    }
    h1 { font-size: clamp(18px, 3.5vw, 26px); }
    #scenario {
      font-size: clamp(13px, 2.5vw, 18px);
      color: #ccc;
      text-align: center;
      max-width: 560px;
      line-height: 1.7;
    }
    canvas { display: block; border-radius: 8px; background: #0d0d1a; }
    #choices { display: flex; gap: clamp(12px, 4vw, 32px); }
    .choice-btn {
      flex: 1;
      border: none;
      border-radius: 12px;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(14px, 3vw, 20px);
      padding: clamp(12px, 3vw, 18px) clamp(16px, 4vw, 32px);
      cursor: pointer;
      transition: transform 0.1s, filter 0.1s;
    }
    .choice-btn:active { transform: scale(0.96); filter: brightness(0.85); }
    #pull { background: #e94560; color: white; }
    #leave { background: #2a2a44; color: #aaa; border: 2px solid #444; }
    #stats {
      display: flex;
      gap: clamp(20px, 6vw, 60px);
      font-size: clamp(13px, 2.5vw, 18px);
    }
    .stat { text-align: center; }
    .stat-val { font-size: clamp(28px, 6vw, 48px); }
    .stat-val.red { color: #e94560; }
    .stat-val.blue { color: #4488ff; }
    #stat-total { font-size: clamp(11px, 2vw, 14px); color: #555; }
    #chosen { font-size: clamp(13px, 2.5vw, 18px); color: #888; min-height: 1.5em; text-align: center; }
  </style>
</head>
<body data-game="00035">
  <h1>The Trolley Problem</h1>
  <div id="scenario">A runaway trolley is heading toward five people tied to the track. You are standing next to a lever. If you pull it, the trolley diverts — but it will hit one person on the other track.</div>
  <canvas id="c" width="480" height="120"></canvas>
  <div id="choices">
    <button class="choice-btn" id="pull">Pull the lever</button>
    <button class="choice-btn" id="leave">Do nothing</button>
  </div>
  <div id="chosen"></div>
  <div id="stats">
    <div class="stat"><div class="stat-val red" id="pull-count">—</div><div>pulled</div></div>
    <div class="stat"><div class="stat-val blue" id="leave-count">—</div><div>did nothing</div></div>
  </div>
  <div id="stat-total"></div>

  <script src="/shared/nav.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    let pullCount = 0, leaveCount = 0;
    let ws, myChoice = null, animPhase = 0;

    function drawScene(leverPulled) {
      const W = canvas.width, H = canvas.height;
      ctx.clearRect(0, 0, W, H);

      // Track
      ctx.strokeStyle = '#446';
      ctx.lineWidth = 4;
      // Main track
      ctx.beginPath(); ctx.moveTo(0, 70); ctx.lineTo(260, 70); ctx.stroke();
      ctx.beginPath(); ctx.moveTo(260, 70); ctx.lineTo(W, 70); ctx.stroke();
      // Branch
      ctx.beginPath(); ctx.moveTo(260, 70); ctx.lineTo(W, 40); ctx.stroke();

      // Lever
      ctx.strokeStyle = leverPulled ? '#44cc88' : '#ffcc00';
      ctx.lineWidth = 5;
      ctx.beginPath();
      ctx.moveTo(260, 70);
      const angle = leverPulled ? -0.7 : 0.3;
      ctx.lineTo(260 + Math.cos(angle) * 30, 70 + Math.sin(angle) * 30);
      ctx.stroke();

      // People on main track (5)
      ctx.fillStyle = '#e94560';
      for (let i = 0; i < 5; i++) {
        ctx.beginPath();
        ctx.arc(340 + i * 20, 60, 6, 0, Math.PI*2);
        ctx.fill();
        ctx.beginPath();
        ctx.moveTo(340 + i * 20, 66); ctx.lineTo(340 + i * 20, 80);
        ctx.strokeStyle = '#e94560'; ctx.lineWidth = 2;
        ctx.stroke();
      }

      // Person on branch (1)
      ctx.fillStyle = '#4488ff';
      ctx.beginPath();
      ctx.arc(400, 32, 6, 0, Math.PI*2);
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(400, 38); ctx.lineTo(400, 52);
      ctx.strokeStyle = '#4488ff'; ctx.lineWidth = 2;
      ctx.stroke();

      // Trolley
      animPhase = (animPhase + 0.5) % 100;
      const tx = animPhase * 2;
      const inRange = tx > 230;
      let trolleyX, trolleyY;
      if (leverPulled && inRange) {
        const t = (tx - 230) / 70;
        trolleyX = 260 + t * (W - 260);
        trolleyY = 70 - t * 30;
      } else {
        trolleyX = tx > 260 ? 260 + (tx - 260) : tx;
        trolleyY = 70;
      }
      ctx.fillStyle = '#ff8800';
      ctx.fillRect(trolleyX - 20, trolleyY - 18, 40, 20);
      ctx.fillStyle = '#ffaa33';
      ctx.fillRect(trolleyX - 14, trolleyY - 28, 12, 10);
      ctx.fillRect(trolleyX + 2, trolleyY - 28, 12, 10);
    }

    function updateStats() {
      document.getElementById('pull-count').textContent = pullCount;
      document.getElementById('leave-count').textContent = leaveCount;
      const total = pullCount + leaveCount;
      if (total > 0) {
        document.getElementById('stat-total').textContent =
          `${total} people have decided — ${Math.round(pullCount/total*100)}% pulled the lever`;
      }
    }

    function connect() {
      ws = new WebSocket(`ws://${window.location.host}`);
      ws.onmessage = e => {
        const d = JSON.parse(e.data);
        if (d.game !== 'trolley') return;
        if (d.type === 'state') { pullCount = d.pull; leaveCount = d.leave; updateStats(); }
      };
      ws.onclose = () => setTimeout(connect, 3000);
    }

    document.getElementById('pull').addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      myChoice = 'pull';
      document.getElementById('chosen').textContent = 'You pulled the lever.';
      document.getElementById('pull').disabled = true;
      document.getElementById('leave').disabled = true;
      ws.send(JSON.stringify({ game: 'trolley', type: 'pull' }));
    });

    document.getElementById('leave').addEventListener('click', () => {
      if (!ws || ws.readyState !== WebSocket.OPEN) return;
      myChoice = 'leave';
      document.getElementById('chosen').textContent = 'You did nothing.';
      document.getElementById('pull').disabled = true;
      document.getElementById('leave').disabled = true;
      ws.send(JSON.stringify({ game: 'trolley', type: 'leave' }));
    });

    function animate() {
      drawScene(myChoice === 'pull');
      requestAnimationFrame(animate);
    }

    connect();
    animate();
  </script>
</body>
</html>
