    function render() {
      const page = PAGES[Math.floor(Math.random() * PAGES.length)];
      const header = document.getElementById('man-header');
      const body = document.getElementById('man-body');
      const footer = document.getElementById('man-footer');
      const sectionLabel = page.title + '                    General Commands Manual                    ' + page.title;

      header.textContent = sectionLabel;

      let html = '';
      for (const line of page.content) {
        if (line.type === 'section') {
          html += `<span class="section-head">${line.text}</span>`;
        } else if (line.type === 'indent') {
          html += `<span class="indent">${escHtml(line.text)}</span>`;
        } else if (line.type === 'double-indent') {
          html += `<span class="double-indent">${escHtml(line.text)}</span>`;
        } else if (line.type === 'synopsis') {
          html += `<span class="synopsis">${escHtml(line.text)}</span>`;
        } else if (line.type === 'blank') {
          html += `<span class="indent"> </span>`;
        }
      }
      body.innerHTML = html;

      const footerDate = `${page.source}                       ${page.date}                    ${page.title}`;
      footer.textContent = footerDate;
    }

    function escHtml(s) {
      return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;');
    }

    render();
    document.getElementById('man-body').addEventListener('click', render);
