<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Cheshire Cat</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #050508;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      gap: 16px;
    }
    canvas { display: block; }
    #quote {
      font-size: clamp(13px, 2.5vw, 18px);
      color: #663366;
      text-align: center;
      max-width: 500px;
      min-height: 1.5em;
      transition: color 3s;
      font-style: italic;
    }
    #quote.visible { color: #cc88cc; }
  </style>
</head>
<body data-game="00046" data-nav="matrix">
  <canvas id="c"></canvas>
  <div id="quote"></div>
  <script src="/shared/nav.js"></script>
  <script>
    const canvas = document.getElementById('c');
    const ctx = canvas.getContext('2d');
    const quoteEl = document.getElementById('quote');

    const QUOTES = [
      "We're all mad here.",
      "I'm not crazy. My reality is just different than yours.",
      "If you don't know where you're going, any road will get you there.",
      "It's no use going back to yesterday, because I was a different person then.",
      "Who in the world am I? Ah, that's the great puzzle!",
      "Curiouser and curiouser.",
    ];

    const size = Math.min(window.innerWidth, window.innerHeight) * 0.55;
    canvas.width = size; canvas.height = size;
    const cx = size/2, cy = size/2;

    let opacity = 0;
    let fading = 'in';
    let phase = 0;

    function easeInOut(t) { return t < 0.5 ? 2*t*t : -1+(4-2*t)*t; }

    function drawCat(op) {
      ctx.clearRect(0, 0, size, size);
      ctx.globalAlpha = op;
      const r = size * 0.28;

      // Body (ellipse)
      ctx.fillStyle = '#553366';
      ctx.beginPath();
      ctx.ellipse(cx, cy + r*0.4, r*1.1, r*0.75, 0, 0, Math.PI*2);
      ctx.fill();

      // Head
      ctx.fillStyle = '#664477';
      ctx.beginPath();
      ctx.arc(cx, cy - r*0.2, r, 0, Math.PI*2);
      ctx.fill();

      // Stripes
      ctx.strokeStyle = '#442255';
      ctx.lineWidth = r * 0.07;
      for (let i = -2; i <= 2; i++) {
        ctx.beginPath();
        ctx.moveTo(cx + i*r*0.25 - r*0.15, cy - r*0.8);
        ctx.lineTo(cx + i*r*0.25 + r*0.15, cy + r*0.4);
        ctx.stroke();
      }

      // Ears
      ctx.fillStyle = '#553366';
      ctx.beginPath();
      ctx.moveTo(cx - r*0.5, cy - r*0.9);
      ctx.lineTo(cx - r*0.75, cy - r*1.35);
      ctx.lineTo(cx - r*0.2, cy - r*1.0);
      ctx.closePath();
      ctx.fill();
      ctx.beginPath();
      ctx.moveTo(cx + r*0.5, cy - r*0.9);
      ctx.lineTo(cx + r*0.75, cy - r*1.35);
      ctx.lineTo(cx + r*0.2, cy - r*1.0);
      ctx.closePath();
      ctx.fill();

      // Eyes
      ctx.fillStyle = '#ffcc00';
      ctx.beginPath(); ctx.ellipse(cx - r*0.3, cy - r*0.3, r*0.14, r*0.1, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + r*0.3, cy - r*0.3, r*0.14, r*0.1, 0, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#000';
      ctx.beginPath(); ctx.ellipse(cx - r*0.3, cy - r*0.3, r*0.05, r*0.09, 0, 0, Math.PI*2); ctx.fill();
      ctx.beginPath(); ctx.ellipse(cx + r*0.3, cy - r*0.3, r*0.05, r*0.09, 0, 0, Math.PI*2); ctx.fill();

      // Nose
      ctx.fillStyle = '#ff88cc';
      ctx.beginPath();
      ctx.arc(cx, cy - r*0.1, r*0.06, 0, Math.PI*2);
      ctx.fill();

      // Smile — stays last when fading
      const smileOp = Math.max(0, op < 0.15 ? op / 0.15 : 1);
      ctx.globalAlpha = Math.max(smileOp, op > 0.05 ? 1 : 0);
      ctx.strokeStyle = '#ff88cc';
      ctx.lineWidth = r * 0.07;
      ctx.lineCap = 'round';
      ctx.beginPath();
      ctx.arc(cx, cy, r*0.35, 0.2, Math.PI - 0.2);
      ctx.stroke();

      // Whiskers (fade out with body)
      ctx.globalAlpha = op;
      ctx.strokeStyle = '#884488';
      ctx.lineWidth = 1.5;
      for (const [dx, dy, len] of [[-1,-0.05,0.5],[-1,0,0.5],[-1,0.05,0.5],[1,-0.05,0.5],[1,0,0.5],[1,0.05,0.5]]) {
        ctx.beginPath();
        ctx.moveTo(cx, cy - r*0.1);
        ctx.lineTo(cx + dx*r*len, cy - r*0.1 + dy*r);
        ctx.stroke();
      }

      ctx.globalAlpha = 1;
    }

    let quoteIdx = 0;
    let showQuote = false;

    function animate() {
      phase += 0.003;
      // Slow sinusoidal fade
      opacity = (Math.sin(phase) + 1) / 2;
      opacity = easeInOut(opacity);

      drawCat(opacity);

      // Show quote when very faint
      if (opacity < 0.1 && !showQuote) {
        showQuote = true;
        quoteEl.textContent = QUOTES[quoteIdx % QUOTES.length];
        quoteEl.className = 'visible';
        quoteIdx++;
      } else if (opacity > 0.3 && showQuote) {
        showQuote = false;
        quoteEl.className = '';
        setTimeout(() => { quoteEl.textContent = ''; }, 3000);
      }

      requestAnimationFrame(animate);
    }

    animate();
  </script>
</body>
</html>
