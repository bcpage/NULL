<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Yellow Door — NULL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; }
body {
  background: #050508;
  font-family: monospace;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  gap: 2rem;
  user-select: none;
}
.room-label {
  position: fixed;
  top: 1.5rem;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  color: rgba(200,180,60,0.15);
  text-transform: uppercase;
}
.door-frame {
  position: relative;
  width: 160px;
  height: 280px;
  border: 3px solid rgba(180,150,30,0.25);
  border-bottom: none;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: pointer;
  transition: border-color 0.3s;
}
.door-frame:hover { border-color: rgba(200,170,40,0.45); }
.door-panel {
  width: 100%;
  height: 100%;
  background: rgba(200,170,20,0.04);
  transition: transform 0.6s cubic-bezier(0.4,0,0.2,1), background 0.3s;
  transform-origin: left center;
  position: relative;
  display: flex;
  align-items: center;
  justify-content: center;
}
.door-panel.open {
  transform: perspective(600px) rotateY(-55deg);
  background: rgba(200,170,20,0.02);
}
.door-knob {
  position: absolute;
  right: 16px;
  top: 50%;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: rgba(200,170,40,0.35);
  border: 1px solid rgba(200,170,40,0.5);
  transition: background 0.2s;
}
.door-panel:hover .door-knob { background: rgba(220,190,60,0.6); }
.door-shadow {
  position: absolute;
  inset: 0;
  background: rgba(200,170,20,0.018);
  pointer-events: none;
}
.behind {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  pointer-events: none;
}
.message {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: rgba(200,180,60,0.3);
  text-align: center;
  min-height: 1.4em;
  transition: opacity 0.5s;
  max-width: 260px;
  line-height: 1.8;
}
.knock-count {
  position: fixed;
  bottom: 60px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 0.55rem;
  letter-spacing: 0.2em;
  color: rgba(200,180,60,0.1);
}
</style>
</head>
<body data-game="00095" data-nav="matrix">

<div class="room-label">The Yellow Door</div>

<div class="door-frame" id="frame" onclick="interact()">
  <div class="behind" id="behind"></div>
  <div class="door-panel" id="door">
    <div class="door-knob"></div>
    <div class="door-shadow"></div>
  </div>
</div>

<div class="message" id="msg"></div>
<div class="knock-count" id="knockCount"></div>

<script src="/shared/matrix-nav.js"></script>
<script>
let isOpen = false;
let knocks = 0;
let msgTimeout;

const KNOCK_MESSAGES = [
  'No answer.',
  'Still no answer.',
  'Nothing.',
  'You wait.',
  'Silence.',
  'The door does not respond.',
  'You hear something. Then nothing.',
  'Maybe knock again.',
  'You knock harder.',
  'The sound goes somewhere.',
  'You are certain you heard footsteps.',
  'The silence after a knock is different from regular silence.',
  'No one is coming.',
  'You have been knocking for a while now.',
  'The door remains yellow.',
];

const OPEN_MESSAGES = [
  'There is nothing behind the door.',
  'Just darkness.',
  'The room beyond is identical to this one.',
  'You see a hallway. It goes somewhere.',
  'Nothing you can name.',
  'It is cold from the other side.',
  'You expected something.',
];

const CLOSE_MESSAGES = [
  'You close it.',
  'Better that way.',
  'The door is yellow again.',
  'You step back.',
];

function showMsg(text, dur = 4000) {
  clearTimeout(msgTimeout);
  const el = document.getElementById('msg');
  el.style.opacity = '0';
  setTimeout(() => {
    el.textContent = text;
    el.style.opacity = '1';
    msgTimeout = setTimeout(() => { el.style.opacity = '0'; }, dur);
  }, 200);
}

function interact() {
  const door = document.getElementById('door');
  if (!isOpen) {
    // First few clicks = knock, then open
    knocks++;
    document.getElementById('knockCount').textContent =
      knocks > 1 ? `${knocks} knocks` : '1 knock';

    if (knocks < 4) {
      showMsg(KNOCK_MESSAGES[Math.min(knocks - 1, KNOCK_MESSAGES.length - 1)]);
    } else if (Math.random() < 0.3 || knocks > 8) {
      // Open it
      door.classList.add('open');
      isOpen = true;
      const msg = OPEN_MESSAGES[Math.floor(Math.random() * OPEN_MESSAGES.length)];
      showMsg(msg, 6000);
    } else {
      showMsg(KNOCK_MESSAGES[Math.min(knocks - 1, KNOCK_MESSAGES.length - 1)]);
    }
  } else {
    door.classList.remove('open');
    isOpen = false;
    showMsg(CLOSE_MESSAGES[Math.floor(Math.random() * CLOSE_MESSAGES.length)]);
  }
}
</script>
</body>
</html>
