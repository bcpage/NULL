<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>00158 — Binary Clock</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050508; color: #8a9aaa;
    font-family: 'Courier New', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 20px; padding: 40px 20px;
  }
  .room-id { font-size: 10px; letter-spacing: 5px; color: #223; }
  .title { font-size: 11px; letter-spacing: 5px; color: #445; text-transform: uppercase; }

  #clock-wrap {
    border: 1px solid #0f0f1a; padding: 28px 36px;
    background: #030306; display: flex; flex-direction: column; gap: 24px; align-items: center;
  }

  /* Binary columns: H H : M M : S S */
  .clock-grid {
    display: flex; align-items: flex-end; gap: 4px;
  }
  .col-group { display: flex; gap: 4px; }
  .col-sep { width: 12px; text-align: center; font-size: 20px; color: #1a2a3a; align-self: center; padding-bottom: 4px; }
  .bit-col { display: flex; flex-direction: column; gap: 4px; align-items: center; }
  .bit {
    width: 22px; height: 22px; border: 1px solid #0a0a18;
    border-radius: 2px; display: flex; align-items: center; justify-content: center;
    transition: background 0.12s, border-color 0.12s;
  }
  .bit.on { background: #1a4a6a; border-color: #2a6a9a; box-shadow: 0 0 6px rgba(60,120,180,0.4); }
  .bit.off { background: #030307; border-color: #0a0a18; }
  .bit-label { font-size: 7px; letter-spacing: 1px; color: #1a2030; margin-top: 4px; }

  .decimal-row { display: flex; gap: 4px; align-items: center; }
  .dec-group { display: flex; gap: 4px; }
  .dec-digit {
    width: 22px; text-align: center; font-size: 16px; letter-spacing: 0;
    color: #2a4a6a; font-variant-numeric: tabular-nums;
  }
  .dec-sep { width: 12px; text-align: center; font-size: 16px; color: #1a2030; }

  .time-label { font-size: 9px; letter-spacing: 4px; color: #1a1a28; }
  .hex-display { font-size: 11px; letter-spacing: 3px; color: #1a3040; }
  .hex-display span { color: #2a4a5a; }

  .legend { font-size: 8px; letter-spacing: 2px; color: #1a1a28; text-align: center; line-height: 2; }

  .note { font-size: 10px; letter-spacing: 1px; color: #223; text-align: center; line-height: 2.2; max-width: 360px; border-top: 1px solid #111120; padding-top: 12px; }
</style>
</head>
<body data-game="00158" data-nav="matrix">
<div class="room-id">ROOM 00158</div>
<div class="title">Binary Clock</div>

<div id="clock-wrap">
  <div class="time-label">CURRENT TIME — BINARY CODED DECIMAL</div>

  <!-- Binary bit display: 6 columns (H1 H2 : M1 M2 : S1 S2) -->
  <div class="clock-grid" id="bit-grid"></div>

  <!-- Decimal below -->
  <div class="decimal-row" id="dec-row"></div>

  <div class="hex-display">0x<span id="hex-time">000000</span></div>

  <div class="legend">
    each column = one decimal digit<br>
    rows from top: 8 — 4 — 2 — 1
  </div>
</div>

<div class="note">
  The time is shown in binary.<br>
  Each column is one decimal digit.<br>
  You are reading the clock correctly<br>
  if the decimal matches your device time.
</div>

<script src="/shared/matrix-nav.js"></script>
<script>
// BCD clock: 6 columns (H1, H2, M1, M2, S1, S2)
// Each column has 4 bits (rows): 8, 4, 2, 1
// Max values: H1=2 (2 bits), H2=9 (4 bits), M1=5 (3 bits), M2=9 (4 bits), S1=5 (3 bits), S2=9 (4 bits)

const LABELS = ['H', 'H', 'M', 'M', 'S', 'S'];
const MAX_BITS = [2, 4, 3, 4, 3, 4]; // max meaningful bits per column

const bitGrid = document.getElementById('bit-grid');
const decRow = document.getElementById('dec-row');

// Build bit grid
const colEls = [];
for (let c = 0; c < 6; c++) {
  if (c === 2 || c === 4) {
    const sep = document.createElement('div');
    sep.className = 'col-sep';
    sep.textContent = ':';
    bitGrid.appendChild(sep);

    const dsep = document.createElement('div');
    dsep.className = 'dec-sep';
    dsep.textContent = ':';
    decRow.appendChild(dsep);
  }

  const col = document.createElement('div');
  col.className = 'bit-col';
  const bits = [];
  for (let b = 3; b >= 0; b--) {
    const bit = document.createElement('div');
    bit.className = 'bit off';
    const needed = b < MAX_BITS[c];
    if (!needed) bit.style.opacity = '0.2';
    col.appendChild(bit);
    bits.push({ el: bit, power: b, active: needed });
  }
  const lbl = document.createElement('div');
  lbl.className = 'bit-label';
  lbl.textContent = LABELS[c];
  col.appendChild(lbl);
  bitGrid.appendChild(col);
  colEls.push(bits);

  // Decimal digit
  const dd = document.createElement('div');
  dd.className = 'dec-digit';
  dd.textContent = '0';
  decRow.appendChild(dd);
}
const decDigits = decRow.querySelectorAll('.dec-digit');

function updateClock() {
  const now = new Date();
  const h = now.getHours();
  const m = now.getMinutes();
  const s = now.getSeconds();
  const digits = [
    Math.floor(h / 10), h % 10,
    Math.floor(m / 10), m % 10,
    Math.floor(s / 10), s % 10,
  ];

  digits.forEach((d, c) => {
    colEls[c].forEach(({ el, power, active }) => {
      if (!active) return;
      const on = (d >> power) & 1;
      el.className = 'bit ' + (on ? 'on' : 'off');
    });
  });

  decDigits.forEach((el, i) => {
    el.textContent = digits[i];
  });

  // Hex display: HHMMSS packed
  const hexVal = (h << 16) | (m << 8) | s;
  document.getElementById('hex-time').textContent = hexVal.toString(16).padStart(6, '0').toUpperCase();
}

updateClock();
setInterval(updateClock, 1000);
</script>
</body>
</html>
