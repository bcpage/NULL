<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>00159 — Mandelbrot Set</title>
<link rel="icon" href="data:,">
<style>
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body {
    background: #050508; color: #8a9aaa;
    font-family: 'Courier New', monospace;
    min-height: 100vh; display: flex; flex-direction: column;
    align-items: center; gap: 12px;
    padding: 30px 20px 50px;
  }
  .room-id { font-size: 10px; letter-spacing: 5px; color: #223; }
  .title { font-size: 11px; letter-spacing: 5px; color: #445; text-transform: uppercase; }
  #mand-canvas { display: block; border: 1px solid #0f0f1e; cursor: crosshair; touch-action: none; }
  .controls { display: flex; gap: 8px; flex-wrap: wrap; justify-content: center; align-items: center; }
  button {
    background: #060610; border: 1px solid #111120; color: #445;
    font-family: 'Courier New', monospace; font-size: 9px;
    letter-spacing: 2px; padding: 7px 14px; cursor: pointer;
  }
  button:hover { background: #0a0a18; color: #667; }
  .info-row { display: flex; gap: 20px; flex-wrap: wrap; justify-content: center; }
  .info { font-size: 9px; letter-spacing: 1px; color: #223; text-align: center; }
  .info span { color: #334; }
  #coords { font-size: 9px; letter-spacing: 1px; color: #1a2a3a; text-align: center; }
  .note { font-size: 10px; letter-spacing: 1px; color: #223; text-align: center; line-height: 2.2; max-width: 380px; border-top: 1px solid #111120; padding-top: 12px; }
</style>
</head>
<body data-game="00159" data-nav="matrix">
<div class="room-id">ROOM 00159</div>
<div class="title">Mandelbrot Set</div>

<canvas id="mand-canvas" width="520" height="380"></canvas>

<div class="controls">
  <button id="reset-btn">RESET</button>
  <button id="zoom-in-btn">ZOOM IN ×2</button>
  <button id="zoom-out-btn">ZOOM OUT ×2</button>
  <button id="render-btn">RE-RENDER</button>
</div>

<div class="info-row">
  <div class="info">CENTER RE<br><span id="cx-val">-0.5</span></div>
  <div class="info">CENTER IM<br><span id="cy-val">0.0</span></div>
  <div class="info">ZOOM<br><span id="zoom-val">1×</span></div>
  <div class="info">ITERATIONS<br><span id="iter-val">100</span></div>
</div>
<div id="coords">Click or drag to pan · Scroll or buttons to zoom</div>

<div class="note">
  The boundary between finite and infinite iteration.<br>
  Points inside never escape. Points outside do.<br>
  Zooming in reveals infinite complexity.<br>
  The boundary has infinite length.
</div>

<script src="/shared/matrix-nav.js"></script>
<script>
const canvas = document.getElementById('mand-canvas');
const ctx = canvas.getContext('2d');
const W = canvas.width, H = canvas.height;

// View state
let cx = -0.5, cy = 0.0, scale = 3.0; // scale = width of the view in complex units
let maxIter = 100;
let rendering = false;

function screenToComplex(px, py) {
  const re = cx + (px / W - 0.5) * scale;
  const im = cy + (py / H - 0.5) * scale * (H / W);
  return { re, im };
}

// Smooth iteration count using escape velocity
function mandelbrot(re, im) {
  let zr = 0, zi = 0, i = 0;
  while (i < maxIter && zr * zr + zi * zi <= 4) {
    const tmp = zr * zr - zi * zi + re;
    zi = 2 * zr * zi + im;
    zr = tmp;
    i++;
  }
  if (i === maxIter) return -1; // inside set
  // Smooth coloring
  const log2 = Math.log2(zr * zr + zi * zi) / 2;
  return i + 1 - Math.log2(log2);
}

// Color palette
function iterToColor(t, maxI) {
  if (t < 0) return [10, 10, 20]; // inside set — dark blue-black
  const f = t / maxI;
  // Multi-tone gradient: dark blue → teal → yellow → white edge
  const r = Math.floor(Math.min(255, f * 3 * 255));
  const g = Math.floor(Math.min(255, Math.max(0, f * 3 * 255 - 128)));
  const b = Math.floor(Math.min(255, Math.max(0, 255 - f * 400)));
  return [r, g, b];
}

function render() {
  if (rendering) return;
  rendering = true;

  const imageData = ctx.createImageData(W, H);
  const data = imageData.data;

  // Render in tiles for performance
  const TILE = 32;
  let tx = 0, ty = 0;

  function renderTile() {
    const x0 = tx, y0 = ty;
    for (let y = y0; y < Math.min(y0 + TILE, H); y++) {
      for (let x = x0; x < Math.min(x0 + TILE, W); x++) {
        const { re, im } = screenToComplex(x, y);
        const t = mandelbrot(re, im);
        const [r, g, b] = iterToColor(t, maxIter);
        const i = (y * W + x) * 4;
        data[i] = r; data[i+1] = g; data[i+2] = b; data[i+3] = 255;
      }
    }
    tx += TILE;
    if (tx >= W) { tx = 0; ty += TILE; }
    if (ty >= H) {
      ctx.putImageData(imageData, 0, 0);
      rendering = false;
      updateInfo();
      return;
    }
    // Show partial progress
    if (ty % (TILE * 4) === 0) ctx.putImageData(imageData, 0, 0);
    setTimeout(renderTile, 0);
  }

  renderTile();
}

function updateInfo() {
  document.getElementById('cx-val').textContent = cx.toFixed(6);
  document.getElementById('cy-val').textContent = cy.toFixed(6);
  document.getElementById('zoom-val').textContent = (3.0 / scale).toFixed(0) + '×';
  document.getElementById('iter-val').textContent = maxIter;
}

function resetView() {
  cx = -0.5; cy = 0.0; scale = 3.0; maxIter = 100;
  render();
}

function zoom(factor, px, py) {
  if (px !== undefined) {
    const { re, im } = screenToComplex(px, py);
    cx = re + (cx - re) * factor;
    cy = im + (cy - im) * factor;
  }
  scale *= factor;
  // Increase iterations at deeper zoom
  maxIter = Math.min(800, Math.round(100 + 50 * Math.log2(3.0 / scale)));
  render();
}

document.getElementById('reset-btn').addEventListener('click', resetView);
document.getElementById('zoom-in-btn').addEventListener('click', () => zoom(0.5));
document.getElementById('zoom-out-btn').addEventListener('click', () => zoom(2.0));
document.getElementById('render-btn').addEventListener('click', render);

// Click to center
let dragging = false, dragStart = null, dragStartCx, dragStartCy;

canvas.addEventListener('mousedown', e => {
  dragging = true;
  dragStart = { x: e.offsetX, y: e.offsetY };
  dragStartCx = cx;
  dragStartCy = cy;
});
canvas.addEventListener('mousemove', e => {
  const { re, im } = screenToComplex(e.offsetX, e.offsetY);
  document.getElementById('coords').textContent =
    `c = ${re.toFixed(6)} + ${im >= 0 ? '' : ''}${im.toFixed(6)}i`;
  if (dragging && dragStart) {
    const dx = (e.offsetX - dragStart.x) / W * scale;
    const dy = (e.offsetY - dragStart.y) / H * scale * (H / W);
    cx = dragStartCx - dx;
    cy = dragStartCy - dy;
    updateInfo();
  }
});
canvas.addEventListener('mouseup', e => {
  if (dragging) {
    const dx = Math.abs(e.offsetX - dragStart.x);
    const dy = Math.abs(e.offsetY - dragStart.y);
    if (dx < 3 && dy < 3) {
      // Single click — center here
      const { re, im } = screenToComplex(e.offsetX, e.offsetY);
      cx = re; cy = im;
    }
    dragging = false;
    render();
  }
});
canvas.addEventListener('mouseleave', () => { if (dragging) { dragging = false; render(); } });

canvas.addEventListener('wheel', e => {
  e.preventDefault();
  const factor = e.deltaY > 0 ? 1.5 : 0.67;
  zoom(factor, e.offsetX, e.offsetY);
}, { passive: false });

// Touch pinch-zoom
let lastTouchDist = null;
canvas.addEventListener('touchstart', e => {
  if (e.touches.length === 2) {
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    lastTouchDist = Math.sqrt(dx*dx + dy*dy);
  }
}, { passive: true });
canvas.addEventListener('touchmove', e => {
  if (e.touches.length === 2 && lastTouchDist) {
    e.preventDefault();
    const dx = e.touches[0].clientX - e.touches[1].clientX;
    const dy = e.touches[0].clientY - e.touches[1].clientY;
    const dist = Math.sqrt(dx*dx + dy*dy);
    zoom(lastTouchDist / dist);
    lastTouchDist = dist;
  }
}, { passive: false });

// Initial render
render();
</script>
</body>
</html>
