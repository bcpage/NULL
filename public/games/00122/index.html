      <p>Welcome to MS-DOS Help. This program provides information about MS-DOS commands and concepts.</p>
      <p>Select a topic from the left panel, or type a command name.</p>
      <h2>About This Version</h2>
      <p>MS-DOS Version: <strong style="color:#fff">6.22</strong><br>
      Help System: <strong style="color:#fff">2.04</strong><br>
      Memory: <strong style="color:#ff6666">Insufficient</strong></p>
      <div class="note">NOTE: Some help pages in this facility have been corrupted or are no longer accurate. Verify all information before use.</div>
      <h2>Quick Reference</h2>
      <p>Common operations and their commands:</p>
      <div class="syntax">
        <span class="cmd">DIR</span>           List files in a directory<br>
        <span class="cmd">CD</span>            Change current directory<br>
        <span class="cmd">COPY</span>          Copy files<br>
        <span class="cmd">FORMAT</span>        Format a disk<br>
        <span class="cmd">MEM</span>           Display memory usage<br>
        <span class="cmd">NULL</span>          Reserved device name

      <p>Displays a list of files and subdirectories in a directory.</p>
      <h2>Syntax</h2>
      <div class="syntax">
        <span class="cmd">DIR</span> <span class="param">[drive:][path][filename] [/P] [/W] [/A[:attribs]] [/O[:sortorder]] [/S] [/B] [/L]</span>

      <h2>Parameters</h2>
      <p><strong style="color:#fff">/P</strong> &nbsp; Pauses after each full screen of information.</p>
      <p><strong style="color:#fff">/W</strong> &nbsp; Uses wide list format.</p>
      <p><strong style="color:#fff">/S</strong> &nbsp; Displays files in the current directory and all subdirectories.</p>
      <p><strong style="color:#fff">/B</strong> &nbsp; Uses bare format (no heading information or summary).</p>

      <div class="syntax">C:\NULL&gt; <span class="cmd">DIR</span> /W<br><br>
 Volume in drive C is NULL<br>
 Volume Serial Number is 0000-0000<br><br>
 Directory of C:\NULL<br><br>
[.]        [..]       SYSTEM     GAMES      DATA<br>
AUTOEXEC   CONFIG     HIMEM      <span class="dimmed">????????</span><br>

      <div class="see-also">See also: <a data-topic="cd">CD</a> &nbsp;|&nbsp; <a data-topic="path">PATH</a></div>
    `

      <h2>Syntax</h2>
      <div class="syntax">
        <span class="cmd">COPY</span> <span class="param">[/A|/B] source [/A|/B] [+source [/A|/B] [...]] [destination [/A|/B]] [/V] [/Y|/-Y]</span>

      <h2>Description</h2>

      <div class="syntax">

const contentEl = document.getElementById('content');
const statusLeft = document.getElementById('status-left');

function renderTopic(key) {
  const topic = topics[key];
  if (!topic) return;
  contentEl.innerHTML = `<h1>${topic.title}</h1>${topic.html}`;
  // Attach see-also links
  contentEl.querySelectorAll('a[data-topic]').forEach(a => {
    a.addEventListener('click', () => selectTopic(a.dataset.topic));
  });
}

function selectTopic(key) {
  document.querySelectorAll('#sidebar .topic').forEach(t => {
    t.classList.toggle('selected', t.dataset.topic === key);
  });
  renderTopic(key);
  const topic = topics[key];
  statusLeft.textContent = topic ? `Topic: ${topic.title}` : 'Topic not found';
}

document.querySelectorAll('#sidebar .topic').forEach(t => {
  t.addEventListener('click', () => selectTopic(t.dataset.topic));
});

// Keyboard navigation
let currentTopicKey = 'index';
const topicKeys = Array.from(document.querySelectorAll('#sidebar .topic')).map(t => t.dataset.topic);
document.addEventListener('keydown', e => {
  if (e.key === 'F3') { e.preventDefault(); return; }
  if (e.key === 'ArrowUp' || e.key === 'ArrowDown') {
    e.preventDefault();
    const idx = topicKeys.indexOf(currentTopicKey);
    const next = e.key === 'ArrowDown' ? Math.min(idx + 1, topicKeys.length - 1) : Math.max(idx - 1, 0);
    currentTopicKey = topicKeys[next];
    selectTopic(currentTopicKey);
  }
});

// Override selectTopic to track current
const _origSelect = selectTopic;
// (already handled by tracking currentTopicKey above)

// Init
renderTopic('index');
</script>
