<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulletin Board — NULL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050508;
  color: #ccc;
  font-family: monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  padding: 2.5rem 1.5rem 6rem;
  gap: 2rem;
}
.title {
  font-size: 0.65rem;
  letter-spacing: 0.35em;
  color: rgba(200,180,140,0.35);
  text-transform: uppercase;
}
.post-form {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 0.6rem;
}
textarea {
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(200,180,140,0.18);
  color: rgba(200,180,140,0.8);
  font-family: monospace;
  font-size: 0.8rem;
  padding: 0.7rem;
  resize: none;
  height: 72px;
  outline: none;
  width: 100%;
  transition: border-color 0.2s;
}
textarea:focus { border-color: rgba(200,180,140,0.45); }
.form-row {
  display: flex;
  gap: 0.6rem;
}
input[type=text] {
  flex: 1;
  background: rgba(255,255,255,0.02);
  border: 1px solid rgba(200,180,140,0.18);
  color: rgba(200,180,140,0.8);
  font-family: monospace;
  font-size: 0.75rem;
  padding: 0.5rem 0.6rem;
  outline: none;
  transition: border-color 0.2s;
}
input[type=text]:focus { border-color: rgba(200,180,140,0.45); }
.btn {
  padding: 0.5rem 1.2rem;
  border: 1px solid rgba(200,180,140,0.25);
  background: transparent;
  color: rgba(200,180,140,0.5);
  font-family: monospace;
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  text-transform: uppercase;
  cursor: pointer;
  transition: all 0.2s;
  white-space: nowrap;
}
.btn:hover:not(:disabled) {
  border-color: rgba(200,180,140,0.6);
  color: rgba(200,180,140,0.9);
  background: rgba(200,180,140,0.04);
}
.btn:disabled { opacity: 0.3; cursor: default; }
.char-count {
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: rgba(200,180,140,0.2);
  text-align: right;
}
.board {
  width: 100%;
  max-width: 520px;
  display: flex;
  flex-direction: column;
  gap: 0.5rem;
}
.board-header {
  font-size: 0.6rem;
  letter-spacing: 0.25em;
  color: rgba(200,180,140,0.2);
  text-transform: uppercase;
  border-bottom: 1px solid rgba(200,180,140,0.07);
  padding-bottom: 0.4rem;
}
.pin {
  border: 1px solid rgba(200,180,140,0.1);
  padding: 0.8rem 1rem;
  display: flex;
  flex-direction: column;
  gap: 0.3rem;
  animation: fadeIn 0.3s ease;
}
@keyframes fadeIn { from { opacity: 0; transform: translateY(-4px); } to { opacity: 1; transform: none; } }
.pin-meta {
  display: flex;
  justify-content: space-between;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  color: rgba(200,180,140,0.25);
}
.pin-author { color: rgba(200,180,140,0.4); }
.pin-text {
  font-size: 0.75rem;
  line-height: 1.6;
  color: rgba(200,180,140,0.65);
  word-break: break-word;
}
.empty {
  font-size: 0.65rem;
  letter-spacing: 0.15em;
  color: rgba(200,180,140,0.15);
  text-align: center;
  padding: 2rem 0;
}
</style>
</head>
<body data-game="00086" data-nav="matrix">

<div class="title">Bulletin Board — NULL Facility</div>

<div class="post-form">
  <textarea id="msgText" maxlength="280" placeholder="Post a notice, observation, or warning..." oninput="updateCount()"></textarea>
  <div class="form-row">
    <input type="text" id="authorText" maxlength="30" placeholder="Name (optional)">
    <button class="btn" id="postBtn" onclick="post()">Pin</button>
  </div>
  <div class="char-count"><span id="charCount">0</span>/280</div>
</div>

<div class="board">
  <div class="board-header">Pinned notices — oldest at bottom</div>
  <div id="pins"><div class="empty">The board is empty.</div></div>
</div>

<script src="/shared/matrix-nav.js"></script>
<script>
function updateCount() {
  document.getElementById('charCount').textContent =
    document.getElementById('msgText').value.length;
}

function formatAge(ts) {
  const s = Math.floor((Date.now() - ts) / 1000);
  if (s < 60) return 'just now';
  if (s < 3600) return Math.floor(s/60) + 'm ago';
  if (s < 86400) return Math.floor(s/3600) + 'h ago';
  return Math.floor(s/86400) + 'd ago';
}

function renderPins(pins) {
  const el = document.getElementById('pins');
  if (!pins.length) { el.innerHTML = '<div class="empty">The board is empty.</div>'; return; }
  el.innerHTML = [...pins].reverse().map(p => `
    <div class="pin">
      <div class="pin-meta">
        <span class="pin-author">${p.author || 'Anonymous'}</span>
        <span>${formatAge(p.ts)}</span>
      </div>
      <div class="pin-text">${p.text.replace(/</g,'&lt;')}</div>
    </div>
  `).join('');
}

function post() {
  const text = document.getElementById('msgText').value.trim();
  if (!text) return;
  const btn = document.getElementById('postBtn');
  btn.disabled = true;

  fetch('/api/bulletin', {
    method: 'POST',
    headers: { 'Content-Type': 'application/json' },
    body: JSON.stringify({
      text,
      author: document.getElementById('authorText').value.trim()
    })
  }).then(r => r.json()).then(pins => {
    renderPins(pins);
    document.getElementById('msgText').value = '';
    document.getElementById('charCount').textContent = '0';
  }).catch(() => {}).finally(() => { btn.disabled = false; });
}

function load() {
  fetch('/api/bulletin').then(r => r.json()).then(renderPins).catch(() => {});
}

load();
setInterval(load, 30000);
</script>
</body>
</html>
