<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Clock — NULL</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  background: #050508;
  font-family: monospace;
  min-height: 100vh;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  gap: 2rem;
  overflow: hidden;
}
.clock-wrap {
  position: relative;
  width: min(70vw, 70vh, 360px);
  height: min(70vw, 70vh, 360px);
}
canvas { display: block; }
.digital {
  font-size: clamp(0.9rem, 3vw, 1.3rem);
  letter-spacing: 0.2em;
  color: rgba(200,180,140,0.3);
  text-align: center;
  font-variant-numeric: tabular-nums;
}
.label {
  font-size: 0.6rem;
  letter-spacing: 0.3em;
  color: rgba(200,180,140,0.15);
  text-transform: uppercase;
  text-align: center;
}
</style>
</head>
<body data-game="00093" data-nav="matrix">

<div class="clock-wrap">
  <canvas id="c"></canvas>
</div>
<div class="digital" id="digital"></div>
<div class="label">NULL Facility — Local Time</div>

<script src="/shared/matrix-nav.js"></script>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
const wrap = canvas.parentElement;

function resize() {
  const s = wrap.clientWidth;
  canvas.width = canvas.height = s;
}
resize();
window.addEventListener('resize', resize);

// Colors for clock elements
const COLORS = {
  face:      'rgba(200,180,140,0.04)',
  border:    'rgba(200,180,140,0.12)',
  tick:      'rgba(200,180,140,0.18)',
  tickMaj:   'rgba(200,180,140,0.35)',
  numeral:   'rgba(200,180,140,0.22)',
  hourHand:  '#e94560',
  minHand:   'rgba(200,180,140,0.6)',
  secHand:   'rgba(143,168,120,0.8)',
  center:    'rgba(200,180,140,0.4)',
  shadow:    'rgba(0,0,0,0.5)',
};

function drawHand(cx, cy, angle, length, width, color, shadow) {
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(angle - Math.PI / 2);
  if (shadow) {
    ctx.shadowColor = color;
    ctx.shadowBlur = 8;
  }
  ctx.beginPath();
  ctx.moveTo(0, length * 0.2);
  ctx.lineTo(0, -length);
  ctx.strokeStyle = color;
  ctx.lineWidth = width;
  ctx.lineCap = 'round';
  ctx.stroke();
  ctx.restore();
}

function draw() {
  const W = canvas.width;
  const cx = W / 2, cy = W / 2;
  const r = W * 0.44;

  ctx.clearRect(0, 0, W, W);

  // Face
  ctx.beginPath();
  ctx.arc(cx, cy, r, 0, Math.PI * 2);
  ctx.fillStyle = COLORS.face;
  ctx.fill();
  ctx.strokeStyle = COLORS.border;
  ctx.lineWidth = W * 0.008;
  ctx.stroke();

  // Tick marks + numerals
  for (let i = 0; i < 60; i++) {
    const angle = (i / 60) * Math.PI * 2 - Math.PI / 2;
    const isMaj = i % 5 === 0;
    const len = isMaj ? r * 0.1 : r * 0.05;
    const x1 = cx + Math.cos(angle) * r * 0.88;
    const y1 = cy + Math.sin(angle) * r * 0.88;
    const x2 = cx + Math.cos(angle) * (r * 0.88 - len);
    const y2 = cy + Math.sin(angle) * (r * 0.88 - len);
    ctx.beginPath();
    ctx.moveTo(x1, y1);
    ctx.lineTo(x2, y2);
    ctx.strokeStyle = isMaj ? COLORS.tickMaj : COLORS.tick;
    ctx.lineWidth = isMaj ? W * 0.007 : W * 0.003;
    ctx.stroke();

    if (isMaj) {
      const num = i === 0 ? 12 : i / 5;
      const nx = cx + Math.cos(angle) * r * 0.72;
      const ny = cy + Math.sin(angle) * r * 0.72;
      ctx.fillStyle = COLORS.numeral;
      ctx.font = `${W * 0.065}px monospace`;
      ctx.textAlign = 'center';
      ctx.textBaseline = 'middle';
      ctx.fillText(num, nx, ny);
    }
  }

  // Time
  const now = new Date();
  const h = now.getHours() % 12;
  const m = now.getMinutes();
  const s = now.getSeconds();
  const ms = now.getMilliseconds();

  const secAngle = ((s + ms / 1000) / 60) * Math.PI * 2;
  const minAngle = ((m + s / 60) / 60) * Math.PI * 2;
  const hourAngle = ((h + m / 60) / 12) * Math.PI * 2;

  // Hour hand
  drawHand(cx, cy, hourAngle, r * 0.5, W * 0.016, COLORS.hourHand, true);
  // Minute hand
  drawHand(cx, cy, minAngle, r * 0.7, W * 0.011, COLORS.minHand, false);
  // Second hand
  drawHand(cx, cy, secAngle, r * 0.8, W * 0.005, COLORS.secHand, false);
  // Counterweight
  ctx.save();
  ctx.translate(cx, cy);
  ctx.rotate(secAngle - Math.PI / 2 + Math.PI);
  ctx.beginPath();
  ctx.moveTo(0, 0);
  ctx.lineTo(0, r * 0.2);
  ctx.strokeStyle = COLORS.secHand;
  ctx.lineWidth = W * 0.006;
  ctx.stroke();
  ctx.restore();

  // Center dot
  ctx.beginPath();
  ctx.arc(cx, cy, W * 0.018, 0, Math.PI * 2);
  ctx.fillStyle = COLORS.center;
  ctx.fill();

  // Digital time
  const pad = n => String(n).padStart(2,'0');
  const ampm = now.getHours() >= 12 ? 'PM' : 'AM';
  document.getElementById('digital').textContent =
    `${pad(now.getHours())}:${pad(m)}:${pad(s)}`;

  requestAnimationFrame(draw);
}

draw();
</script>
</body>
</html>
