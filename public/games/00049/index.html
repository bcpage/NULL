<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>MASH</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 12px;
      gap: 10px;
    }
    h1 {
      font-size: clamp(20px, 4vw, 32px);
      letter-spacing: 0.15em;
      color: #e94560;
    }
    #subtitle { font-size: clamp(11px, 2vw, 14px); color: #444; }
    #board {
      display: grid;
      grid-template-columns: 1fr 1fr 1fr;
      gap: 8px;
      width: 100%;
      max-width: 680px;
      flex: 1;
      overflow: hidden;
    }
    .cat-block {
      background: #0d0d1a;
      border: 1px solid #1a1a3a;
      border-radius: 10px;
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 4px;
    }
    .cat-title {
      font-size: clamp(11px, 2vw, 14px);
      color: #888;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      text-align: center;
      border-bottom: 1px solid #1a1a3a;
      padding-bottom: 4px;
      margin-bottom: 2px;
    }
    .cat-title.mash-title { color: #e94560; }
    .mash-letters {
      display: flex;
      justify-content: center;
      gap: 10px;
    }
    .mash-letter {
      font-size: clamp(18px, 4vw, 28px);
      color: #333;
      transition: color 0.3s;
      cursor: default;
    }
    .mash-letter.active { color: #e94560; }
    .opt-input {
      background: transparent;
      border: none;
      border-bottom: 1px solid #222;
      color: #ccc;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(12px, 2vw, 15px);
      padding: 3px 4px;
      width: 100%;
      outline: none;
    }
    .opt-input:focus { border-bottom-color: #4488ff; }
    .opt-input.struck { color: #333; text-decoration: line-through; }
    .opt-input.winner { color: #ffcc00; border-bottom-color: #ffcc00; }
    #controls { display: flex; gap: 10px; align-items: center; }
    button {
      background: transparent;
      border: 2px solid #2a2a44;
      border-radius: 10px;
      color: #666;
      font-family: 'Fredoka One', cursive;
      font-size: clamp(13px, 2.5vw, 17px);
      padding: 6px 18px;
      cursor: pointer;
      transition: border-color 0.2s, color 0.2s;
    }
    button:hover { border-color: #4488ff; color: #4488ff; }
    #spiral-wrap {
      position: relative;
      width: 80px;
      height: 80px;
      flex-shrink: 0;
    }
    #spiral-canvas { position: absolute; top: 0; left: 0; }
    #spiral-count {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      font-size: clamp(22px, 5vw, 32px);
      color: #e94560;
    }
    #result-msg {
      font-size: clamp(12px, 2.5vw, 16px);
      color: #4488ff;
      text-align: center;
      min-height: 1.4em;
    }
    #phase-hint { font-size: clamp(10px, 1.8vw, 13px); color: #333; }
  </style>
</head>
<body data-game="00049" data-nav="matrix">
  <h1>M A S H</h1>
  <div id="subtitle">Mansion · Apartment · Shack · House</div>

  <div id="board">
    <!-- MASH -->
    <div class="cat-block" style="grid-column: 1 / -1;">
      <div class="cat-title mash-title">Where You'll Live</div>
      <div class="mash-letters">
        <span class="mash-letter" id="m">M</span>
        <span class="mash-letter" id="a">A</span>
        <span class="mash-letter" id="s">S</span>
        <span class="mash-letter" id="h">H</span>
      </div>
    </div>
    <!-- Spouse -->
    <div class="cat-block">
      <div class="cat-title">Spouse</div>
      <input class="opt-input" data-cat="spouse" data-idx="0" placeholder="Name...">
      <input class="opt-input" data-cat="spouse" data-idx="1" placeholder="Name...">
      <input class="opt-input" data-cat="spouse" data-idx="2" placeholder="Name...">
      <input class="opt-input" data-cat="spouse" data-idx="3" placeholder="Name...">
    </div>
    <!-- Job -->
    <div class="cat-block">
      <div class="cat-title">Job</div>
      <input class="opt-input" data-cat="job" data-idx="0" placeholder="Career...">
      <input class="opt-input" data-cat="job" data-idx="1" placeholder="Career...">
      <input class="opt-input" data-cat="job" data-idx="2" placeholder="Career...">
      <input class="opt-input" data-cat="job" data-idx="3" placeholder="Career...">
    </div>
    <!-- City -->
    <div class="cat-block">
      <div class="cat-title">City</div>
      <input class="opt-input" data-cat="city" data-idx="0" placeholder="City...">
      <input class="opt-input" data-cat="city" data-idx="1" placeholder="City...">
      <input class="opt-input" data-cat="city" data-idx="2" placeholder="City...">
      <input class="opt-input" data-cat="city" data-idx="3" placeholder="City...">
    </div>
    <!-- Kids -->
    <div class="cat-block">
      <div class="cat-title">Kids</div>
      <input class="opt-input" data-cat="kids" data-idx="0" placeholder="#" value="0">
      <input class="opt-input" data-cat="kids" data-idx="1" placeholder="#" value="2">
      <input class="opt-input" data-cat="kids" data-idx="2" placeholder="#" value="5">
      <input class="opt-input" data-cat="kids" data-idx="3" placeholder="#" value="10">
    </div>
    <!-- Car -->
    <div class="cat-block">
      <div class="cat-title">Car</div>
      <input class="opt-input" data-cat="car" data-idx="0" placeholder="Car...">
      <input class="opt-input" data-cat="car" data-idx="1" placeholder="Car...">
      <input class="opt-input" data-cat="car" data-idx="2" placeholder="Car...">
      <input class="opt-input" data-cat="car" data-idx="3" placeholder="Car...">
    </div>
    <!-- Pet -->
    <div class="cat-block">
      <div class="cat-title">Pet</div>
      <input class="opt-input" data-cat="pet" data-idx="0" placeholder="Pet..." value="Dog">
      <input class="opt-input" data-cat="pet" data-idx="1" placeholder="Pet..." value="Cat">
      <input class="opt-input" data-cat="pet" data-idx="2" placeholder="Pet..." value="Snake">
      <input class="opt-input" data-cat="pet" data-idx="3" placeholder="Pet..." value="Ferret">
    </div>
  </div>

  <div id="controls">
    <div id="spiral-wrap">
      <canvas id="spiral-canvas" width="80" height="80"></canvas>
      <div id="spiral-count"></div>
    </div>
    <div style="display:flex;flex-direction:column;gap:6px;align-items:center">
      <button id="spin-btn">Draw Spiral</button>
      <button id="reset-btn">Reset</button>
    </div>
  </div>
  <div id="result-msg"></div>
  <div id="phase-hint">fill in your options, then draw the spiral</div>

  <script src="/shared/nav.js"></script>
  <script>
    const spiralCanvas = document.getElementById('spiral-canvas');
    const sCtx = spiralCanvas.getContext('2d');
    const spiralCount = document.getElementById('spiral-count');
    const resultMsg = document.getElementById('result-msg');
    const phaseHint = document.getElementById('phase-hint');

    const MASH = ['M','A','S','H'];
    const CATS = ['spouse','job','city','kids','car','pet'];
    const DEFAULTS = {
      spouse: ['','','',''],
      job: ['','','',''],
      city: ['','','',''],
      kids: ['0','2','5','10'],
      car: ['','','',''],
      pet: ['Dog','Cat','Snake','Ferret'],
    };

    let phase = 'setup';
    let spiralN = 0;
    let spiralDrawing = false;
    let spiralFrame = 0;
    let spiralTarget = 0;

    function drawSpiral(n) {
      sCtx.clearRect(0, 0, 80, 80);
      const cx = 40, cy = 40;
      sCtx.strokeStyle = '#e94560';
      sCtx.lineWidth = 1.5;
      sCtx.beginPath();
      let angle = 0, r = 0;
      const steps = n * 80;
      for (let i = 0; i <= steps; i++) {
        const t = i / steps;
        r = t * 30;
        const x = cx + Math.cos(angle) * r;
        const y = cy + Math.sin(angle) * r;
        if (i === 0) sCtx.moveTo(x, y); else sCtx.lineTo(x, y);
        angle += (Math.PI * 2 * n) / steps;
      }
      sCtx.stroke();
    }

    function animateSpiral() {
      if (!spiralDrawing) return;
      spiralFrame++;
      const progress = Math.min(spiralFrame / 40, 1);
      const displayN = Math.round(progress * spiralTarget);
      if (displayN !== spiralN) {
        spiralN = displayN;
        drawSpiral(spiralN);
        spiralCount.textContent = spiralN || '';
      }
      if (progress < 1) requestAnimationFrame(animateSpiral);
      else {
        spiralDrawing = false;
        spiralCount.textContent = spiralTarget;
        runMASH(spiralTarget);
      }
    }

    document.getElementById('spin-btn').addEventListener('click', () => {
      if (spiralDrawing) return;
      spiralTarget = Math.floor(Math.random() * 9) + 3;
      spiralFrame = 0;
      spiralDrawing = true;
      phase = 'animating';
      requestAnimationFrame(animateSpiral);
    });

    document.getElementById('reset-btn').addEventListener('click', () => {
      phase = 'setup';
      spiralDrawing = false;
      sCtx.clearRect(0, 0, 80, 80);
      spiralCount.textContent = '';
      resultMsg.textContent = '';
      phaseHint.textContent = 'fill in your options, then draw the spiral';
      document.querySelectorAll('.opt-input').forEach(el => {
        el.classList.remove('struck', 'winner');
        el.disabled = false;
      });
      MASH.forEach(l => document.getElementById(l.toLowerCase()).classList.remove('active'));
    });

    function getOptions() {
      const result = { mash: ['M','A','S','H'] };
      CATS.forEach(cat => {
        result[cat] = [];
        for (let i = 0; i < 4; i++) {
          const el = document.querySelector(`[data-cat="${cat}"][data-idx="${i}"]`);
          result[cat].push((el?.value || '').trim() || `Option ${i+1}`);
        }
      });
      return result;
    }

    function runMASH(n) {
      const opts = getOptions();
      const allItems = [
        ...opts.mash.map((v,i) => ({ cat:'mash', idx:i, val:v })),
        ...CATS.flatMap(cat => opts[cat].map((v,i) => ({ cat, idx:i, val:v }))),
      ];
      const total = allItems.length;
      let active = allItems.map((_,i) => i);
      let pos = 0;

      while (active.length > total - (total - Math.ceil(total / n) * 1) && active.length > 7) {
        const skip = (pos + n - 1) % active.length;
        const removed = active.splice(skip, 1)[0];
        pos = skip % active.length;
        const item = allItems[removed];
        const sel = item.cat === 'mash'
          ? document.getElementById(item.val.toLowerCase())
          : document.querySelector(`[data-cat="${item.cat}"][data-idx="${item.idx}"]`);
        if (sel) {
          if (item.cat === 'mash') sel.classList.remove('active');
          else { sel.classList.add('struck'); sel.disabled = true; }
        }
      }

      // Mark winners
      active.forEach(i => {
        const item = allItems[i];
        if (item.cat === 'mash') {
          document.getElementById(item.val.toLowerCase()).classList.add('active');
        } else {
          const el = document.querySelector(`[data-cat="${item.cat}"][data-idx="${item.idx}"]`);
          if (el) { el.classList.add('winner'); el.disabled = true; }
        }
      });

      const mashWinner = active.find(i => allItems[i].cat === 'mash');
      if (mashWinner !== undefined) {
        const letter = allItems[mashWinner].val;
        const full = { M:'Mansion',A:'Apartment',S:'Shack',H:'House' }[letter] || letter;
        resultMsg.textContent = `You will live in a ${full}.`;
      }
      phaseHint.textContent = 'your fate is sealed';
    }
  </script>
</body>
</html>
