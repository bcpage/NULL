<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>Game of Life</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }

    #controls {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      justify-content: center;
      gap: 6px;
      width: 100%;
      flex-shrink: 0;
    }

    /* filled primary button */
    .btn {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      padding: 5px 16px;
      border: none;
      border-radius: 20px;
      cursor: pointer;
      background: #e94560;
      color: white;
      transition: background 0.12s, transform 0.08s, opacity 0.12s;
      white-space: nowrap;
    }
    .btn:hover { background: #c73652; }
    .btn:active { transform: scale(0.95); }
    .btn:disabled { opacity: 0.35; cursor: default; transform: none; }

    /* outline secondary button */
    .btn-outline {
      font-family: 'Fredoka One', cursive;
      font-size: 0.9rem;
      padding: 5px 14px;
      border: 2px solid #555;
      border-radius: 20px;
      cursor: pointer;
      background: transparent;
      color: #aaa;
      transition: background 0.12s, color 0.12s, border-color 0.12s, transform 0.08s, opacity 0.12s;
      white-space: nowrap;
    }
    .btn-outline:hover { background: #333; color: white; border-color: #888; }
    .btn-outline:active { transform: scale(0.95); }
    .btn-outline.selected { background: #e94560; color: white; border-color: #e94560; }
    .btn-outline:disabled { opacity: 0.35; cursor: default; transform: none; }

    #divider { width: 1px; height: 24px; background: #444; margin: 0 4px; }

    #size-control {
      display: flex;
      align-items: center;
      gap: 6px;
      white-space: nowrap;
      color: #aaa;
      font-size: 0.85rem;
    }
    #size-slider {
      -webkit-appearance: none;
      appearance: none;
      width: 90px;
      height: 4px;
      border-radius: 2px;
      background: #555;
      outline: none;
      cursor: pointer;
    }
    #size-slider::-webkit-slider-thumb {
      -webkit-appearance: none;
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
    }
    #size-slider::-moz-range-thumb {
      width: 16px; height: 16px;
      border-radius: 50%;
      background: #e94560;
      cursor: pointer;
      border: none;
    }
    #size-val { color: white; min-width: 2ch; text-align: right; }

    #gen-display {
      display: flex;
      align-items: baseline;
      gap: 5px;
      color: #ffcc00;
      white-space: nowrap;
    }
    #gen-count { font-size: 1.3rem; }
    .gen-label { font-size: 0.8rem; color: #666; }

    #canvas-wrapper {
      flex: 1;
      min-height: 0;
      width: 100%;
      display: flex;
      align-items: stretch;
    }

    canvas {
      display: block;
      cursor: crosshair;
      touch-action: none;
      width: 100%;
      height: 100%;
    }

    /* ── Help modal ─────────────────────────────────────────────────────── */
    #help-overlay {
      display: none;
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.75);
      z-index: 100;
      align-items: center;
      justify-content: center;
      padding: 16px;
    }
    #help-overlay.open { display: flex; }

    #help-modal {
      background: #1e1e35;
      border: 1px solid #444;
      border-radius: 16px;
      padding: 20px;
      max-width: 720px;
      width: 100%;
      max-height: 90dvh;
      overflow-y: auto;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }

    #help-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
    }
    #help-header h2 { font-size: 1.4rem; color: #e94560; }
    #help-close {
      background: none;
      border: none;
      color: #888;
      font-size: 1.6rem;
      cursor: pointer;
      line-height: 1;
      padding: 0 4px;
      font-family: sans-serif;
    }
    #help-close:hover { color: white; }

    #help-subtext { font-size: 0.85rem; color: #666; }

    #pattern-grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(150px, 1fr));
      gap: 12px;
    }

    .pattern-card {
      background: #252545;
      border: 2px solid #333;
      border-radius: 12px;
      padding: 10px;
      cursor: pointer;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 8px;
      transition: border-color 0.15s, background 0.15s;
    }
    .pattern-card:hover { border-color: #e94560; background: #2e2e55; }
    .pattern-card canvas { border-radius: 6px; image-rendering: pixelated; }
    .pattern-card .p-name { font-size: 0.9rem; color: white; text-align: center; }
    .pattern-card .p-desc { font-size: 0.72rem; color: #888; text-align: center; line-height: 1.3; }
  </style>
</head>
<body data-game="00004" data-nav="matrix">

  <div id="controls">
    <button class="btn"         id="btn-start">▶ Start</button>
    <button class="btn-outline" id="btn-step">Step</button>
    <button class="btn-outline" id="btn-clear">Clear</button>
    <button class="btn-outline" id="btn-random">Random</button>
    <div id="divider"></div>
    <div id="gen-display">
      <span id="gen-count">0</span>
      <span class="gen-label">gen</span>
    </div>
    <div id="divider"></div>
    <button class="btn-outline speed-btn selected" data-ms="120">Slow</button>
    <button class="btn-outline speed-btn"          data-ms="40">Med</button>
    <button class="btn-outline speed-btn"          data-ms="15">Fast</button>
    <div id="divider"></div>
    <div id="size-control">
      Size
      <input type="range" id="size-slider" min="5" max="60" value="30">
      <span id="size-val">30</span>
    </div>
    <div id="divider"></div>
    <button class="btn-outline" id="btn-help">? Help</button>
  </div>

  <div id="canvas-wrapper">
    <canvas id="life-canvas"></canvas>
  </div>

  <!-- Help modal -->
  <div id="help-overlay">
    <div id="help-modal">
      <div id="help-header">
        <h2>Classic Patterns</h2>
        <button id="help-close">✕</button>
      </div>
      <div id="help-subtext">Click any pattern to place it in the centre of the grid.</div>
      <div id="pattern-grid"></div>
    </div>
  </div>

  <script src="/shared/nav.js"></script>
  <script>
    let CELL = 30; // px per cell — adjustable via slider

    const canvas  = document.getElementById('life-canvas');
    const ctx     = canvas.getContext('2d');
    const genEl   = document.getElementById('gen-count');
    const startBtn = document.getElementById('btn-start');
    const stepBtn  = document.getElementById('btn-step');

    let cols = 0, rows = 0, grid = [];
    let generation = 0;
    let running = false;
    let simTimer = null;
    let speedMs = 120;
    let drawMode = null; // 1 = painting alive, 0 = erasing

    // ── Grid helpers ────────────────────────────────────────────────────────
    function idx(c, r) { return r * cols + c; }

    function neighbors(c, r) {
      let n = 0;
      for (let dr = -1; dr <= 1; dr++) {
        for (let dc = -1; dc <= 1; dc++) {
          if (!dr && !dc) continue;
          n += grid[((r + dr + rows) % rows) * cols + ((c + dc + cols) % cols)];
        }
      }
      return n;
    }

    // ── Simulation ──────────────────────────────────────────────────────────
    function step() {
      const next = new Array(cols * rows).fill(0);
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          const alive = grid[idx(c, r)];
          const n = neighbors(c, r);
          next[idx(c, r)] = alive ? (n === 2 || n === 3 ? 1 : 0) : (n === 3 ? 1 : 0);
        }
      }
      grid = next;
      generation++;
      draw();
      updateUI();
    }

    // ── Drawing ─────────────────────────────────────────────────────────────
    function draw() {
      ctx.fillStyle = '#0e0e1e';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#39d353';
      for (let r = 0; r < rows; r++) {
        for (let c = 0; c < cols; c++) {
          if (grid[idx(c, r)]) {
            ctx.fillRect(c * CELL + 1, r * CELL + 1, CELL - 1, CELL - 1);
          }
        }
      }
      // faint grid dot at each corner for reference
      ctx.fillStyle = '#1c1c2e';
      for (let r = 0; r <= rows; r++) {
        for (let c = 0; c <= cols; c++) {
          ctx.fillRect(c * CELL, r * CELL, 1, 1);
        }
      }
    }

    // ── UI ──────────────────────────────────────────────────────────────────
    function updateUI() {
      genEl.textContent = generation.toLocaleString();
      startBtn.textContent = running ? '⏸ Stop' : '▶ Start';
      stepBtn.disabled = running;
    }

    // ── Controls ────────────────────────────────────────────────────────────
    function startStop() {
      running = !running;
      if (running) {
        simTimer = setInterval(step, speedMs);
      } else {
        clearInterval(simTimer);
        simTimer = null;
      }
      updateUI();
    }

    function setSpeed(ms) {
      speedMs = ms;
      document.querySelectorAll('.speed-btn').forEach(b => {
        b.classList.toggle('selected', parseInt(b.dataset.ms) === ms);
      });
      if (running) { clearInterval(simTimer); simTimer = setInterval(step, speedMs); }
    }

    function clearGrid() {
      grid = new Array(cols * rows).fill(0);
      generation = 0;
      draw(); updateUI();
    }

    function randomize() {
      grid = Array.from({ length: cols * rows }, () => Math.random() < 0.3 ? 1 : 0);
      draw();
    }

    document.getElementById('btn-start').addEventListener('click', startStop);
    document.getElementById('btn-step').addEventListener('click', () => { if (!running) step(); });
    document.getElementById('btn-clear').addEventListener('click', clearGrid);
    document.getElementById('btn-random').addEventListener('click', randomize);
    document.querySelectorAll('.speed-btn').forEach(b => {
      b.addEventListener('click', () => setSpeed(parseInt(b.dataset.ms)));
    });

    // ── Canvas input ────────────────────────────────────────────────────────
    function cellFromEvent(clientX, clientY) {
      const rect = canvas.getBoundingClientRect();
      const scaleX = canvas.width  / rect.width;
      const scaleY = canvas.height / rect.height;
      const c = Math.floor((clientX - rect.left) * scaleX / CELL);
      const r = Math.floor((clientY - rect.top)  * scaleY / CELL);
      if (c < 0 || c >= cols || r < 0 || r >= rows) return null;
      return { c, r };
    }

    function paintAt(clientX, clientY) {
      const pos = cellFromEvent(clientX, clientY);
      if (!pos || drawMode === null) return;
      if (grid[idx(pos.c, pos.r)] === drawMode) return;
      grid[idx(pos.c, pos.r)] = drawMode;
      draw();
    }

    canvas.addEventListener('mousedown', e => {
      const pos = cellFromEvent(e.clientX, e.clientY);
      if (!pos) return;
      drawMode = grid[idx(pos.c, pos.r)] ? 0 : 1;
      grid[idx(pos.c, pos.r)] = drawMode;
      draw();
    });
    canvas.addEventListener('mousemove', e => { if (drawMode !== null) paintAt(e.clientX, e.clientY); });
    window.addEventListener('mouseup', () => { drawMode = null; });

    canvas.addEventListener('touchstart', e => {
      e.preventDefault();
      const t = e.touches[0];
      const pos = cellFromEvent(t.clientX, t.clientY);
      if (!pos) return;
      drawMode = grid[idx(pos.c, pos.r)] ? 0 : 1;
      grid[idx(pos.c, pos.r)] = drawMode;
      draw();
    }, { passive: false });
    canvas.addEventListener('touchmove', e => {
      e.preventDefault();
      const t = e.touches[0];
      paintAt(t.clientX, t.clientY);
    }, { passive: false });
    canvas.addEventListener('touchend', () => { drawMode = null; });

    // ── Resize ──────────────────────────────────────────────────────────────
    function resize() {
      const wrapper = document.getElementById('canvas-wrapper');
      const w = wrapper.clientWidth  || window.innerWidth;
      const h = wrapper.clientHeight || (window.innerHeight - 80);
      canvas.width  = w;
      canvas.height = h;
      const newCols = Math.floor(w / CELL);
      const newRows = Math.floor(h / CELL);
      if (newCols !== cols || newRows !== rows) {
        cols = newCols; rows = newRows;
        grid = new Array(cols * rows).fill(0);
        generation = 0;
        updateUI();
      }
      draw();
    }

    const sizeSlider = document.getElementById('size-slider');
    const sizeVal    = document.getElementById('size-val');
    sizeSlider.addEventListener('input', () => {
      CELL = parseInt(sizeSlider.value);
      sizeVal.textContent = CELL;
      resize();
    });

    // ── Pattern library ──────────────────────────────────────────────────────
    function parsePattern(str) {
      const cells = [];
      str.trim().split('\n').forEach((line, row) => {
        [...line].forEach((ch, col) => { if (ch === 'X') cells.push([col, row]); });
      });
      return cells;
    }

    const PATTERNS = [
      { name: 'Glider',
        desc: 'Travels diagonally forever — the most famous pattern',
        cells: parsePattern(
`X..
..X
.XX
.X.`) },
      { name: 'Blinker',
        desc: 'Alternates between horizontal and vertical. Period 2',
        cells: parsePattern(`XXX`) },
      { name: 'Block',
        desc: 'Still life — completely stable, never changes',
        cells: parsePattern(
`XX
XX`) },
      { name: 'Beehive',
        desc: 'Still life — a stable 6-cell honeycomb',
        cells: parsePattern(
`.XX.
X..X
.XX.`) },
      { name: 'Toad',
        desc: 'Two rows offset by one cell, flips each step. Period 2',
        cells: parsePattern(
`.XXX
XXX.`) },
      { name: 'Beacon',
        desc: 'Two touching blocks that blink at the corners. Period 2',
        cells: parsePattern(
`XX..
X...
...X
..XX`) },
      { name: 'Pulsar',
        desc: 'Large symmetric oscillator with beautiful symmetry. Period 3',
        cells: parsePattern(
`..XXX...XXX..
.............
X....X.X....X
X....X.X....X
X....X.X....X
..XXX...XXX..
.............
..XXX...XXX..
X....X.X....X
X....X.X....X
X....X.X....X
.............
..XXX...XXX..`) },
      { name: 'Lightweight Spaceship',
        desc: 'Travels horizontally across the grid. Period 4',
        cells: parsePattern(
`.XXXX
X...X
....X
X..X.`) },
      { name: 'R-pentomino',
        desc: 'Just 5 cells, yet evolves chaotically for 1,103 generations',
        cells: parsePattern(
`.XX
XX.
.X.`) },
      { name: 'Gosper Glider Gun',
        desc: 'Shoots a new glider every 30 steps — forever',
        cells: parsePattern(
`........................X...........
......................X.X...........
............XX......XX............XX
...........X...X....XX............XX
XX........X.....X...XX..............
XX........X...X.XX....X.X...........
..........X.....X.......X...........
...........X...X....................
............XX......................`) },
    ];

    function renderPreview(previewCanvas, cells) {
      if (!cells.length) return;
      const maxC = Math.max(...cells.map(([c]) => c)) + 1;
      const maxR = Math.max(...cells.map(([, r]) => r)) + 1;
      const cs = Math.max(2, Math.min(14, Math.floor(140 / maxC), Math.floor(100 / maxR)));
      previewCanvas.width  = maxC * cs;
      previewCanvas.height = maxR * cs;
      const pc = previewCanvas.getContext('2d');
      pc.fillStyle = '#0e0e1e';
      pc.fillRect(0, 0, previewCanvas.width, previewCanvas.height);
      pc.fillStyle = '#39d353';
      cells.forEach(([c, r]) => pc.fillRect(c * cs, r * cs, cs - 1, cs - 1));
    }

    function placePattern(cells) {
      if (!cells.length) return;
      const maxC = Math.max(...cells.map(([c]) => c));
      const maxR = Math.max(...cells.map(([, r]) => r));
      const offC = Math.floor((cols - maxC) / 2);
      const offR = Math.floor((rows - maxR) / 2);
      cells.forEach(([c, r]) => {
        const gc = offC + c, gr = offR + r;
        if (gc >= 0 && gc < cols && gr >= 0 && gr < rows) grid[idx(gc, gr)] = 1;
      });
      draw();
    }

    // Build pattern cards
    const patternGrid = document.getElementById('pattern-grid');
    PATTERNS.forEach(p => {
      const card = document.createElement('div');
      card.className = 'pattern-card';
      const pc = document.createElement('canvas');
      renderPreview(pc, p.cells);
      const name = document.createElement('div'); name.className = 'p-name'; name.textContent = p.name;
      const desc = document.createElement('div'); desc.className = 'p-desc'; desc.textContent = p.desc;
      card.append(pc, name, desc);
      card.addEventListener('click', () => {
        placePattern(p.cells);
        document.getElementById('help-overlay').classList.remove('open');
      });
      patternGrid.appendChild(card);
    });

    // Modal open/close
    document.getElementById('btn-help').addEventListener('click', () => {
      document.getElementById('help-overlay').classList.add('open');
    });
    document.getElementById('help-close').addEventListener('click', () => {
      document.getElementById('help-overlay').classList.remove('open');
    });
    document.getElementById('help-overlay').addEventListener('click', e => {
      if (e.target === e.currentTarget) e.currentTarget.classList.remove('open');
    });

    window.addEventListener('resize', resize);
    requestAnimationFrame(resize);
  </script>
</body>
</html>
