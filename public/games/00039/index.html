<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
  <title>The Recursive Room</title>
  <link href="https://fonts.googleapis.com/css2?family=Fredoka+One&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: #1a1a2e;
      color: white;
      font-family: 'Fredoka One', cursive;
      display: flex;
      flex-direction: column;
      align-items: center;
      height: 100vh;
      height: 100dvh;
      overflow: hidden;
      padding: 8px;
      gap: 8px;
    }
    h1 { font-size: clamp(18px, 3.5vw, 26px); margin-top: 4px; }
    #frame-wrap {
      flex: 1;
      width: 100%;
      max-width: 700px;
      border: 3px solid #333;
      border-radius: 8px;
      overflow: hidden;
      position: relative;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
      display: block;
    }
    #depth-counter { font-size: clamp(11px, 2vw, 14px); color: #555; }
    #note { font-size: clamp(11px, 2vw, 13px); color: #333; text-align: center; max-width: 500px; }
  </style>
</head>
<body data-game="00039">
  <h1>The Recursive Room</h1>
  <div id="frame-wrap">
    <iframe id="frame" src="/game/00039" sandbox="allow-scripts allow-same-origin" title="recursive frame"></iframe>
  </div>
  <div id="depth-counter">depth: 1</div>
  <div id="note">you are looking at this room, inside this room, inside this room…</div>

  <script src="/shared/nav.js"></script>
  <script>
    // Track recursion depth via URL param
    const params = new URLSearchParams(window.location.search);
    const depth = parseInt(params.get('d') || '0');
    document.getElementById('depth-counter').textContent = `depth: ${depth + 1}`;

    const frame = document.getElementById('frame');
    if (depth < 6) {
      frame.src = `/game/00039?d=${depth + 1}`;
    } else {
      // Bottom of recursion
      frame.srcdoc = `<html><body style="background:#0a0a14;color:#333;font-family:Fredoka One,cursive;display:flex;align-items:center;justify-content:center;height:100vh;font-size:14px;">you have reached the bottom</body></html>`;
    }
  </script>
</body>
</html>
